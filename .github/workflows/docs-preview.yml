name: docs-preview

on:
  pull_request:
    paths:
      - "docs/**"

permissions:
  contents: read

jobs:
  build:
    name: Build Jekyll docs (preview)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: docs

      - name: Build Jekyll
        run: bundle exec jekyll build --source . --destination ./_site
        working-directory: docs
